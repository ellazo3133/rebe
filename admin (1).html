<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin — Torá del Rebe</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root { --bg:#f4f1ea; --bg2:#fff; --ink:#26221a; --muted:#867c6c; --line:#e4ddcd; --gold:#b08418; --gold-l:#d9b24a; --green:#2f8f63; --red:#c0532f; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background: var(--bg); color: var(--ink); font-family:'DM Sans',sans-serif; }
  header { background: var(--bg2); border-bottom: 1px solid var(--line); padding: 16px 28px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
  .brand { font-family:'Fraunces',serif; font-size: 20px; font-weight:500; display:flex; align-items:center; gap:10px; }
  .brand .m { width:30px;height:30px;background:linear-gradient(140deg,var(--gold),var(--gold-l));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff; }
  .tabs { display:flex; gap:6px; }
  .tab { background:transparent; border:1px solid var(--line); border-radius:9px; padding:9px 18px; cursor:pointer; font-size:14px; color:var(--muted); font-family:inherit; }
  .tab.activo { background: var(--ink); color:#fff; border-color: var(--ink); }
  .wrap { max-width: 1100px; margin: 28px auto; padding: 0 28px; }
  .panel { display:none; }
  .panel.activo { display:block; }

  .btn { background: linear-gradient(135deg,var(--gold),var(--gold-l)); color:#fff; border:none; border-radius:10px; padding:12px 22px; font-weight:600; font-size:14px; cursor:pointer; font-family:inherit; }
  .btn:hover { opacity:.92; }
  .btn-sec { background:var(--bg2); border:1px solid var(--line); color:var(--ink); border-radius:10px; padding:10px 18px; cursor:pointer; font-size:14px; font-family:inherit; }
  .btn-del { background:transparent; border:1px solid #e6c4b8; color:var(--red); border-radius:8px; padding:7px 14px; cursor:pointer; font-size:13px; font-family:inherit; }

  .top-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; }
  .top-row h2 { font-family:'Fraunces',serif; font-size:28px; font-weight:400; }

  .card { background:var(--bg2); border:1px solid var(--line); border-radius:14px; padding:22px; margin-bottom:14px; }
  .est-row { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; }
  .est-info h3 { font-family:'Fraunces',serif; font-size:19px; font-weight:400; margin-bottom:6px; }
  .est-info .meta { font-size:13px; color:var(--muted); margin-bottom:8px; }
  .badges { display:flex; gap:6px; flex-wrap:wrap; }
  .badge { font-size:11px; border-radius:20px; padding:3px 10px; background:#f0ead9; color:#8a7a4e; }
  .badge.rec { background:#eaf4ee; color:var(--green); }
  .est-actions { display:flex; gap:8px; flex-shrink:0; }
  .est-count { font-size:13px; color:var(--muted); margin-top:8px; }
  .est-count b { color:var(--ink); }

  /* form */
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .full { grid-column: 1 / -1; }
  label { display:block; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; font-weight:500; }
  input, select, textarea { width:100%; background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:11px 14px; font-size:14px; color:var(--ink); outline:none; font-family:inherit; }
  input:focus, select:focus, textarea:focus { border-color:var(--gold); }
  .hint { font-size:12px; color:var(--muted); margin-top:4px; font-weight:300; }
  .recurso-input { display:flex; gap:8px; align-items:center; }
  .recurso-input input[type=file] { padding:8px; font-size:13px; }

  table { width:100%; border-collapse:collapse; background:var(--bg2); border-radius:14px; overflow:hidden; }
  th, td { text-align:left; padding:12px 14px; font-size:14px; border-bottom:1px solid var(--line); }
  th { background:#f0ead9; font-size:12px; letter-spacing:.5px; text-transform:uppercase; color:#8a7a4e; }
  td .done { color:var(--green); font-weight:600; }
  td .pend { color:var(--muted); }
  .filtros { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .stat-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
  .scard { background:var(--bg2); border:1px solid var(--line); border-radius:14px; padding:20px; }
  .scard .n { font-family:'Fraunces',serif; font-size:34px; font-weight:500; color:var(--gold); }
  .scard .l { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }

  .overlay { position:fixed; inset:0; background:rgba(40,35,22,.5); display:none; align-items:center; justify-content:center; padding:20px; z-index:100; }
  .overlay.open { display:flex; }
  .modal { background:var(--bg2); border-radius:18px; max-width:720px; width:100%; max-height:92vh; overflow-y:auto; padding:32px; }
  .modal h3 { font-family:'Fraunces',serif; font-size:24px; font-weight:400; margin-bottom:20px; }
  .modal .acciones { display:flex; gap:12px; margin-top:24px; }

  .login { max-width:400px; margin:80px auto; background:var(--bg2); border:1px solid var(--line); border-radius:18px; padding:36px; text-align:center; }
  .login h2 { font-family:'Fraunces',serif; font-weight:400; margin-bottom:8px; }
  .login p { color:var(--muted); font-size:14px; margin-bottom:24px; }
  .csv { font-size:13px; color:var(--gold); cursor:pointer; }
  @media (max-width:640px){ .form-grid,.stat-cards{grid-template-columns:1fr;} .tabs{flex-wrap:wrap;} }
</style>
</head>
<body>

<div id="loginScreen" class="login">
  <h2>Panel de administraci&oacute;n</h2>
  <p>Ingres&aacute; la clave para gestionar estudios y ver respuestas.</p>
  <input type="password" id="claveInput" placeholder="Clave de acceso" style="margin-bottom:14px">
  <button class="btn" style="width:100%" onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none">
<header>
  <div class="brand"><span class="m">&#10017;</span> Admin &middot; Tor&aacute; del Rebe</div>
  <div class="tabs">
    <button class="tab activo" data-panel="estudios" onclick="tab('estudios')">Estudios</button>
    <button class="tab" data-panel="respuestas" onclick="tab('respuestas')">Respuestas</button>
    <button class="tab" data-panel="comentarios" onclick="tab('comentarios')">Comentarios</button>
    <button class="tab" data-panel="carrusel" onclick="tab('carrusel')">Carrusel</button>
    <button class="tab" data-panel="tags" onclick="tab('tags')">Tags</button>
  </div>
</header>

<div class="wrap">

  <!-- ESTUDIOS -->
  <div class="panel activo" id="panel-estudios">
    <div class="top-row"><h2>Estudios</h2><button class="btn" onclick="nuevoEstudio()">+ Nuevo estudio</button></div>
    <div id="listaEstudios"></div>
  </div>

  <!-- RESPUESTAS -->
  <div class="panel" id="panel-respuestas">
    <div class="top-row"><h2>Respuestas de la gente</h2><button class="btn-sec" onclick="exportarCSV()">&#8675; Exportar CSV</button></div>
    <div class="stat-cards" id="statCards"></div>
    <div class="filtros">
      <select id="filtroEstudio" onchange="pintarRespuestas()"><option value="">Todos los estudios</option></select>
      <select id="filtroEstado" onchange="pintarRespuestas()"><option value="">Todos</option><option value="si">Completados</option><option value="no">Pendientes</option></select>
    </div>
    <div style="overflow-x:auto"><table id="tablaResp"></table></div>
  </div>

  <!-- COMENTARIOS -->
  <div class="panel" id="panel-comentarios">
    <div class="top-row"><h2>Comentarios</h2></div>
    <div class="filtros">
      <select id="filtroComentEstado" onchange="pintarComentarios()"><option value="pendientes">Pendientes de aprobar</option><option value="aprobados">Aprobados</option><option value="todos">Todos</option></select>
    </div>
    <div id="listaComentarios"></div>
  </div>

  <!-- CARRUSEL -->
  <div class="panel" id="panel-carrusel">
    <div class="top-row"><h2>Carrusel de novedades</h2><button class="btn" onclick="nuevoSlide()">+ Nueva imagen</button></div>
    <div id="listaSlides"></div>
  </div>

  <!-- TAGS -->
  <div class="panel" id="panel-tags">
    <div class="top-row"><h2>Tags</h2></div>
    <div class="card">
      <p style="color:var(--muted);font-size:14px;margin-bottom:14px;font-weight:300">Los tags se asignan al crear o editar cada estudio. Ac&aacute; ves todos los que est&aacute;n en uso.</p>
      <div class="badges" id="listaTags"></div>
    </div>
  </div>

</div>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<script src="config.js"></script>
<script>
  // Clave simple de acceso al panel (cambiala acá)
  const CLAVE_ADMIN = "rebe2026";

  let estudios = [], compromisos = [], comentarios = [], slides = [];

  function login() {
    if (document.getElementById('claveInput').value === CLAVE_ADMIN) {
      sessionStorage.setItem('admin_ok','1');
      mostrarApp();
    } else { alert('Clave incorrecta.'); }
  }
  function mostrarApp() {
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    cargar();
  }
  if (sessionStorage.getItem('admin_ok')==='1') mostrarApp();

  async function cargar() {
    const { data: est } = await supabaseClient.from('estudios').select('*').order('orden');
    estudios = est || [];
    const { data: comp } = await supabaseClient.from('compromisos').select('*').order('creado_en',{ascending:false});
    compromisos = comp || [];
    const { data: com } = await supabaseClient.from('comentarios').select('*').order('creado_en',{ascending:false});
    comentarios = com || [];
    const { data: sl } = await supabaseClient.from('slides').select('*').order('orden');
    slides = sl || [];
    pintarEstudios(); pintarRespuestas(); pintarTags(); llenarFiltros(); pintarComentarios(); pintarSlides();
  }

  function tab(t) {
    document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('activo', x.dataset.panel===t));
    document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('activo', p.id==='panel-'+t));
  }

  function conteo(id){ return compromisos.filter(c=>c.estudio_id===id).length; }

  function pintarEstudios() {
    const cont = document.getElementById('listaEstudios');
    if (!estudios.length) { cont.innerHTML='<div class="card">No hay estudios. Cre&aacute; el primero.</div>'; return; }
    cont.innerHTML = estudios.map(s => {
      const recs = [
        s.pdf_url?'<span class="badge rec">PDF</span>':'',
        s.video_url?'<span class="badge rec">Video</span>':'',
        s.audio_url?'<span class="badge rec">Audio</span>':'',
        s.resumen_extendido_url?'<span class="badge rec">Resumen+</span>':''
      ].join('');
      const tags = (s.tags||[]).map(t=>'<span class="badge">'+t+'</span>').join('');
      return '<div class="card"><div class="est-row"><div class="est-info">'
        + '<h3>'+s.titulo+'</h3>'
        + '<div class="meta">'+(s.tipo||'Maamar')+'</div>'
        + '<div class="badges">'+recs+tags+'</div>'
        + '<div class="est-count"><b>'+conteo(s.id)+'</b> personas anotadas</div>'
        + '</div><div class="est-actions">'
        + '<button class="btn-sec" onclick="editarEstudio(\''+s.id+'\')">Editar</button>'
        + '<button class="btn-del" onclick="borrarEstudio(\''+s.id+'\')">Borrar</button>'
        + '</div></div></div>';
    }).join('');
  }

  function formEstudio(s) {
    s = s || {};
    const recurso = (id,label,val) =>
      '<div class="full"><label>'+label+'</label>'
      + '<div class="recurso-input"><input id="'+id+'" placeholder="Pegá un link externo (https://...)" value="'+(val||'')+'">'
      + '<input type="file" id="'+id+'_file" onchange="subirArchivo(this,\''+id+'\')"></div>'
      + '<div class="hint">Pod&eacute;s pegar un link o subir un archivo.</div></div>';
    return '<div class="form-grid">'
      + '<div class="full"><label>T&iacute;tulo *</label><input id="e_titulo" value="'+(s.titulo||'')+'"></div>'
      + '<div><label>Tipo</label><input id="e_tipo" value="'+(s.tipo||'Maamar')+'" placeholder="Maamar / Likkutéi Sijot..."></div>'
      + '<div><label>Orden (1,2,3...)</label><input id="e_orden" type="number" value="'+(s.orden||0)+'"></div>'
      + '<div class="full"><label>Resumen</label><textarea id="e_resumen" rows="3">'+(s.resumen||'')+'</textarea></div>'
      + '<div class="full"><label>Tags (separados por coma)</label><input id="e_tags" value="'+((s.tags||[]).join(', '))+'" placeholder="Simjá, Iom Tov, Alter Rebe"></div>'
      + recurso('e_pdf','PDF', s.pdf_url)
      + recurso('e_video','Video', s.video_url)
      + recurso('e_audio','Audio', s.audio_url)
      + recurso('e_resumen_ext','Resumen extendido (PDF)', s.resumen_extendido_url)
      + '</div>';
  }

  function nuevoEstudio() {
    document.getElementById('modal').innerHTML = '<h3>Nuevo estudio</h3>'+formEstudio()
      + '<div class="acciones"><button class="btn" onclick="guardarEstudio()">Crear estudio</button><button class="btn-sec" onclick="cerrar()">Cancelar</button></div>';
    abrir(); window._editId = null;
  }
  function editarEstudio(id) {
    const s = estudios.find(x=>x.id===id);
    document.getElementById('modal').innerHTML = '<h3>Editar estudio</h3>'+formEstudio(s)
      + '<div class="acciones"><button class="btn" onclick="guardarEstudio()">Guardar cambios</button><button class="btn-sec" onclick="cerrar()">Cancelar</button></div>';
    abrir(); window._editId = id;
  }

  async function subirArchivo(input, campoId) {
    const file = input.files[0]; if (!file) return;
    const path = Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const { error } = await supabaseClient.storage.from('archivos').upload(path, file);
    if (error) { alert('Error subiendo archivo. \u00bfCreaste el bucket "archivos" en Supabase Storage?'); console.error(error); return; }
    const { data } = supabaseClient.storage.from('archivos').getPublicUrl(path);
    document.getElementById(campoId).value = data.publicUrl;
    alert('Archivo subido y link cargado.');
  }

  async function guardarEstudio() {
    const g = id => (document.getElementById(id)?.value||'').trim();
    const fila = {
      titulo: g('e_titulo'), tipo: g('e_tipo'), resumen: g('e_resumen'),
      orden: parseInt(g('e_orden'))||0,
      tags: g('e_tags') ? g('e_tags').split(',').map(t=>t.trim()).filter(Boolean) : [],
      pdf_url: g('e_pdf')||null, video_url: g('e_video')||null,
      audio_url: g('e_audio')||null, resumen_extendido_url: g('e_resumen_ext')||null
    };
    if (!fila.titulo) { alert('El t\u00edtulo es obligatorio.'); return; }
    let error;
    if (window._editId) {
      ({ error } = await supabaseClient.from('estudios').update(fila).eq('id', window._editId));
    } else {
      ({ error } = await supabaseClient.from('estudios').insert(fila));
    }
    if (error) { alert('Error al guardar.'); console.error(error); return; }
    cerrar(); cargar();
  }

  async function borrarEstudio(id) {
    if (!confirm('\u00bfBorrar este estudio? Se borran tambi\u00e9n sus compromisos.')) return;
    const { error } = await supabaseClient.from('estudios').delete().eq('id', id);
    if (error) { alert('Error.'); return; }
    cargar();
  }

  // RESPUESTAS
  function llenarFiltros() {
    const sel = document.getElementById('filtroEstudio');
    sel.innerHTML = '<option value="">Todos los estudios</option>' + estudios.map(s=>'<option value="'+s.id+'">'+s.titulo+'</option>').join('');
  }
  function pintarRespuestas() {
    const fe = document.getElementById('filtroEstudio').value;
    const fest = document.getElementById('filtroEstado').value;
    let filas = compromisos.slice();
    if (fe) filas = filas.filter(c=>c.estudio_id===fe);
    if (fest==='si') filas = filas.filter(c=>c.completado);
    if (fest==='no') filas = filas.filter(c=>!c.completado);

    const total = compromisos.length;
    const done = compromisos.filter(c=>c.completado).length;
    document.getElementById('statCards').innerHTML =
      '<div class="scard"><div class="n">'+total+'</div><div class="l">Compromisos</div></div>'
      + '<div class="scard"><div class="n">'+done+'</div><div class="l">Completados</div></div>'
      + '<div class="scard"><div class="n">'+estudios.length+'</div><div class="l">Estudios</div></div>'
      + '<div class="scard"><div class="n">'+(total?Math.round(done/total*100):0)+'%</div><div class="l">Tasa finalizaci&oacute;n</div></div>';

    const nombreEst = id => (estudios.find(s=>s.id===id)||{}).titulo || '—';
    document.getElementById('tablaResp').innerHTML =
      '<tr><th>Nombre</th><th>Ciudad</th><th>Email</th><th>WhatsApp</th><th>Edad</th><th>Estudio</th><th>Estado</th><th>Fecha</th></tr>'
      + filas.map(c =>
        '<tr><td>'+c.nombre+' '+c.apellido+'</td><td>'+(c.ciudad||'')+'</td><td>'+c.email+'</td><td>'+(c.telefono||'')+'</td><td>'+(c.edad||'')+'</td>'
        + '<td>'+nombreEst(c.estudio_id)+'</td>'
        + '<td>'+(c.completado?'<span class="done">&#10003; Completado</span>':'<span class="pend">Pendiente</span>')+'</td>'
        + '<td>'+new Date(c.creado_en).toLocaleDateString('es-AR')+'</td></tr>'
      ).join('');
  }

  function exportarCSV() {
    const nombreEst = id => (estudios.find(s=>s.id===id)||{}).titulo || '';
    const headers = ['Nombre','Apellido','Ciudad','Comunidad','Email','WhatsApp','Edad','Estudio','Completado','Motivacion','Fecha'];
    const rows = compromisos.map(c => [c.nombre,c.apellido,c.ciudad,c.comunidad,c.email,c.telefono,c.edad,nombreEst(c.estudio_id),c.completado?'Si':'No',(c.motivacion||'').replace(/\n/g,' '),new Date(c.creado_en).toLocaleString('es-AR')]);
    const csv = [headers, ...rows].map(r => r.map(x => '"'+String(x||'').replace(/"/g,'""')+'"').join(',')).join('\n');
    const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'compromisos_torahdelrebe.csv'; a.click();
  }

  function pintarTags() {
    const set = new Set(); estudios.forEach(s=>(s.tags||[]).forEach(t=>set.add(t)));
    const cont = document.getElementById('listaTags');
    cont.innerHTML = set.size ? [...set].map(t=>'<span class="badge">'+t+'</span>').join('') : '<span style="color:var(--muted)">A&uacute;n no hay tags.</span>';
  }

  // COMENTARIOS
  function pintarComentarios() {
    const f = document.getElementById('filtroComentEstado').value;
    let lista = comentarios.slice();
    if (f==='pendientes') lista = lista.filter(c=>!c.aprobado);
    if (f==='aprobados') lista = lista.filter(c=>c.aprobado);
    const nombreEst = id => (estudios.find(s=>s.id===id)||{}).titulo || '—';
    const cont = document.getElementById('listaComentarios');
    if (!lista.length) { cont.innerHTML='<div class="card">No hay comentarios.</div>'; return; }
    cont.innerHTML = lista.map(c =>
      '<div class="card"><div class="est-row"><div class="est-info">'
      + '<h3 style="font-size:16px">'+c.nombre+(c.aprobado?' <span class="badge rec">Aprobado</span>':' <span class="badge">Pendiente</span>')+'</h3>'
      + '<div class="meta">Sobre: '+nombreEst(c.estudio_id)+'</div>'
      + '<p style="font-size:14px;color:var(--ink);margin-top:8px">'+c.texto+'</p>'
      + '</div><div class="est-actions">'
      + (c.aprobado ? '<button class="btn-sec" onclick="aprobarComent(\''+c.id+'\',false)">Ocultar</button>' : '<button class="btn" onclick="aprobarComent(\''+c.id+'\',true)">Aprobar</button>')
      + '<button class="btn-del" onclick="borrarComent(\''+c.id+'\')">Borrar</button>'
      + '</div></div></div>'
    ).join('');
  }
  async function aprobarComent(id, val) {
    const { error } = await supabaseClient.from('comentarios').update({ aprobado: val }).eq('id', id);
    if (error) { alert('Error.'); return; } cargar();
  }
  async function borrarComent(id) {
    if (!confirm('\u00bfBorrar este comentario?')) return;
    const { error } = await supabaseClient.from('comentarios').delete().eq('id', id);
    if (error) { alert('Error.'); return; } cargar();
  }

  // SLIDES (carrusel)
  function pintarSlides() {
    const cont = document.getElementById('listaSlides');
    if (!slides.length) { cont.innerHTML='<div class="card">No hay im&aacute;genes en el carrusel. Agreg&aacute; la primera.</div>'; return; }
    cont.innerHTML = slides.map(s =>
      '<div class="card"><div class="est-row"><div class="est-info" style="display:flex;gap:16px;align-items:center">'
      + '<img src="'+s.imagen_url+'" style="width:120px;height:68px;object-fit:cover;border-radius:8px">'
      + '<div><h3 style="font-size:16px">'+(s.titulo||'(sin t\u00edtulo)')+'</h3>'
      + '<div class="meta">'+(s.link_url?'Link: '+s.link_url:'Sin link')+(s.activo?'':' &middot; OCULTO')+'</div></div>'
      + '</div><div class="est-actions">'
      + '<button class="btn-sec" onclick="editarSlide(\''+s.id+'\')">Editar</button>'
      + '<button class="btn-del" onclick="borrarSlide(\''+s.id+'\')">Borrar</button>'
      + '</div></div></div>'
    ).join('');
  }
  function formSlide(s) {
    s = s || {};
    return '<div class="form-grid">'
      + '<div class="full"><label>Imagen (16:9 recomendado) *</label><div class="recurso-input"><input id="s_img" placeholder="Pegá un link de imagen (https://...)" value="'+(s.imagen_url||'')+'"><input type="file" id="s_img_file" onchange="subirArchivo(this,\'s_img\')"></div></div>'
      + '<div class="full"><label>T&iacute;tulo (opcional)</label><input id="s_titulo" value="'+(s.titulo||'')+'"></div>'
      + '<div class="full"><label>Link externo al hacer clic (opcional)</label><input id="s_link" placeholder="https://..." value="'+(s.link_url||'')+'"></div>'
      + '<div><label>Orden</label><input id="s_orden" type="number" value="'+(s.orden||0)+'"></div>'
      + '<div><label>Activo</label><select id="s_activo"><option value="true"'+(s.activo!==false?' selected':'')+'>S&iacute;</option><option value="false"'+(s.activo===false?' selected':'')+'>No</option></select></div>'
      + '</div>';
  }
  function nuevoSlide() {
    document.getElementById('modal').innerHTML = '<h3>Nueva imagen del carrusel</h3>'+formSlide()
      + '<div class="acciones"><button class="btn" onclick="guardarSlide()">Crear</button><button class="btn-sec" onclick="cerrar()">Cancelar</button></div>';
    abrir(); window._slideId = null;
  }
  function editarSlide(id) {
    const s = slides.find(x=>x.id===id);
    document.getElementById('modal').innerHTML = '<h3>Editar imagen</h3>'+formSlide(s)
      + '<div class="acciones"><button class="btn" onclick="guardarSlide()">Guardar</button><button class="btn-sec" onclick="cerrar()">Cancelar</button></div>';
    abrir(); window._slideId = id;
  }
  async function guardarSlide() {
    const g = id => (document.getElementById(id)?.value||'').trim();
    const fila = { imagen_url:g('s_img'), titulo:g('s_titulo')||null, link_url:g('s_link')||null, orden:parseInt(g('s_orden'))||0, activo:g('s_activo')==='true' };
    if (!fila.imagen_url) { alert('La imagen es obligatoria.'); return; }
    let error;
    if (window._slideId) ({ error } = await supabaseClient.from('slides').update(fila).eq('id', window._slideId));
    else ({ error } = await supabaseClient.from('slides').insert(fila));
    if (error) { alert('Error al guardar.'); console.error(error); return; }
    cerrar(); cargar();
  }
  async function borrarSlide(id) {
    if (!confirm('\u00bfBorrar esta imagen?')) return;
    const { error } = await supabaseClient.from('slides').delete().eq('id', id);
    if (error) { alert('Error.'); return; } cargar();
  }

  function abrir(){ document.getElementById('overlay').classList.add('open'); }
  function cerrar(){ document.getElementById('overlay').classList.remove('open'); }
  document.getElementById('overlay').onclick = e => { if (e.target.id==='overlay') cerrar(); };
</script>
</body>
</html>
